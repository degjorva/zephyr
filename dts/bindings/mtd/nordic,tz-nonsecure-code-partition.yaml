description: |
  Nordic TrustZone Non-Secure Code Partition.

  Marks a flash/RRAM partition as an image slot for Non-Secure code on Nordic
  TrustZone-capable SoCs (nRF91, nRF53, nRF54L, ...). Consumed by the TF-M
  build to compute FLASH_NS_PARTITION_SIZE (the per-slot size fed to the
  non-secure image maximum size).

  This binding is a peer of "nordic,tz-nonsecure-data-partition", not a
  specialization of an umbrella tag. Code slots carry only this compatible;
  data regions (NS storage, ...) carry only the data-partition compatible.
  The TF-M build aggregates both compatibles when it needs the total
  non-secure flash footprint (FLASH_NONSECURE_TOTAL_SIZE).

  Any number of okay nodes of this compatible is allowed, but they must all
  have the same reg size (primary and secondary MCUboot slots must match).
  A BUILD_ASSERT in the TF-M build enforces this.

  Example (single slot, non-MCUboot):

      slot0_ns_partition: partition@8a000 {
          compatible = "nordic,tz-nonsecure-code-partition";
          label = "image-0-nonsecure";
          reg = <0x0008a000 DT_SIZE_K(940)>;
      };

compatible: "nordic,tz-nonsecure-code-partition"

include: [base.yaml]

properties:
  reg:
    required: true
  label:
    type: string
    required: false
