description: |
  Nordic TrustZone Non-Secure Data Partition.

  Marks a flash/RRAM partition as assigned to the ARM TrustZone Non-Secure
  state and carrying *data* (not executable code) on Nordic TrustZone-capable
  SoCs (nRF91, nRF53, nRF54L, ...). Typical consumers are non-secure storage
  backends (ZMS, settings, etc.).

  This binding is a peer of "nordic,tz-nonsecure-code-partition", not an
  umbrella over it. Code slots use the code-partition compatible exclusively;
  data regions use this one. The TF-M build aggregates both compatibles to
  compute the full non-secure flash footprint (FLASH_NONSECURE_TOTAL_SIZE);
  doing the split at the binding level lets FLASH_NS_PARTITION_SIZE remain a
  per-slot value without needing extra tagging on each node.

  The tag is additive: the node is still a child of a "fixed-partitions"
  table and continues to be validated by the fixed-partitions child-binding.

  Example:

      &cpuapp_rram {
          partitions {
              compatible = "fixed-partitions";
              #address-cells = <1>;
              #size-cells = <1>;

              storage_partition: partition@175000 {
                  compatible = "nordic,tz-nonsecure-data-partition";
                  label = "storage";
                  reg = <0x00175000 DT_SIZE_K(32)>;
              };
          };
      };

compatible: "nordic,tz-nonsecure-data-partition"

include: [base.yaml]

properties:
  reg:
    required: true
  label:
    type: string
    required: false
